<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Arcbotix - Intelligent Automation Solutions" />
  <meta name="robots" content="index, follow" />

  <!-- Security Headers via meta -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'" />

  <!-- Open Graph -->
  <meta property="og:title" content="Arcbotix" />
  <meta property="og:description" content="Intelligent Automation Solutions" />
  <meta property="og:url" content="https://arcbotix.com" />
  <meta property="og:type" content="website" />

  <title>Arcbotix</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { max-width: 800px; text-align: center; }
    h1 { font-size: clamp(2rem, 8vw, 5rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1rem; }
    .accent { color: #6c63ff; }
    p { font-size: 1.2rem; color: #9999bb; max-width: 500px; margin: 0 auto 2rem; }
    .badge {
      display: inline-block;
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.4);
      color: #6c63ff;
      padding: 0.4rem 1.2rem;
      border-radius: 999px;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    footer { margin-top: 4rem; font-size: 0.8rem; color: #55556a; }
  </style>
</head>
<body>
  <div class="container">
    <p class="badge">Coming Soon</p>
    <h1>Arc<span class="accent">botix</span></h1>
    <p>Intelligent automation solutions for the modern web.</p>
    <footer>&copy; 2026 Arcbotix. All rights reserved.</footer>
  </div>
</body>
</html>
